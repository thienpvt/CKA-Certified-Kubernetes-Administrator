name: Validate YAML

on:
  push:
    branches: [main]
    paths:
      - 'skeletons/**'
      - 'exercises/**'
      - 'cka-sim/**'
      - '**.yaml'
      - '**.yml'
      - '**.sh'
  pull_request:
    branches: [main]
    paths:
      - 'skeletons/**'
      - 'exercises/**'
      - 'cka-sim/**'
      - '**.yaml'
      - '**.yml'
      - '**.sh'
  # Manual-fire trigger so the symptom-diff job can be exercised on demand
  # (covers Actions-disabled / first-run scenarios where push events haven't
  # yet kicked off a workflow run).
  workflow_dispatch:

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint skeleton YAML files
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 200}, truthy: disable, document-start: disable, comments-indentation: disable, indentation: {indent-sequences: whatever}, new-lines: {type: platform}}}' skeletons/

      - name: Validate YAML syntax (kubectl dry-run)
        run: |
          echo "--- Checking YAML syntax ---"
          errors=0
          for f in skeletons/*.yaml; do
            if ! python3 -c "import yaml, sys; yaml.safe_load_all(open('$f'))" 2>/dev/null; then
              echo "INVALID: $f"
              errors=$((errors + 1))
            else
              echo "OK: $f"
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "$errors file(s) failed validation"
            exit 1
          fi
          echo "All YAML files valid"

  bash-tests:
    name: Bash unit tests (traps + grade)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Phase 5 (RESEARCH §13 + VALIDATION.md Wave 0): dedicated named lint step
      # runs BEFORE the aggregate test.sh so any future refactor of test.sh's
      # lint chain cannot silently drop deprecated-string enforcement. test.sh
      # also invokes this lint internally (belt + suspenders).
      - name: Lint deprecated strings
        run: bash cka-sim/scripts/lint-deprecated-strings.sh

      # WR-11 (04-REVIEW.md): the standalone coverage step used to run before
      # pack lint, so a malformed manifest.yaml surfaced as a confusing
      # "no questions" coverage error instead of the real pack-lint root cause.
      # test.sh runs the five lints in the correct order (traps -> packs ->
      # coverage -> trap-coverage -> deprecated-strings -> unit cases), so one
      # step covers everything. Phase 12 LINT-01 added the trap-coverage step.
      - name: Run cka-sim test suite
        run: bash cka-sim/scripts/test.sh

  shellcheck:
    name: ShellCheck + yamllint (cka-sim)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          pip install yamllint

      - name: Run validate-local
        run: bash cka-sim/scripts/validate-local.sh

  symptom-diff:
    name: Live-cluster symptom diff (kind + Calico)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq + python3-yaml + kubectl + kind
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq python3-yaml
          # kubectl
          KUBECTL_VERSION="v1.30.0"
          curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client
          # kind
          KIND_VERSION="v0.23.0"
          curl -fsSL -o /tmp/kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          sudo install -m 0755 /tmp/kind /usr/local/bin/kind
          kind version

      - name: Create kind cluster (no default CNI; Calico will own networking)
        run: |
          cat > /tmp/kind-config.yaml <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          networking:
            disableDefaultCNI: true
            podSubnet: "192.168.0.0/16"
          nodes:
            - role: control-plane
            - role: worker
          EOF
          kind create cluster --name cka-sim --config /tmp/kind-config.yaml --wait 120s || true
          # Don't fail on initial wait — nodes go Ready only after Calico installs.
          kubectl get nodes

      - name: Install Calico v3.27.3
        run: |
          set -euo pipefail
          kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.3/manifests/calico.yaml
          # Wait for Calico controller and node DaemonSet to be ready.
          kubectl -n kube-system wait --for=condition=Available deployment/calico-kube-controllers --timeout=180s
          kubectl -n kube-system rollout status daemonset/calico-node --timeout=180s
          kubectl wait --for=condition=Ready nodes --all --timeout=120s

      - name: Verify expected-symptom.yaml count
        run: |
          count=$(find cka-sim/packs -name 'expected-symptom.yaml' | wc -l)
          echo "expected-symptom.yaml files: $count"
          if [[ "$count" -ne 34 ]]; then
            echo "::error::expected 34 expected-symptom.yaml files; found $count"
            exit 1
          fi

      - name: Run live-cluster symptom diff
        env:
          CKA_SIM_ROOT: ${{ github.workspace }}/cka-sim
        run: |
          bash cka-sim/scripts/lint-question-symptom.sh

      - name: Capture diagnostics on failure
        if: failure()
        run: |
          kubectl get nodes -o wide || true
          kubectl get pods -A || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -100 || true

# storage/01-pvc-binding — post-setup.sh symptom expected by question.md.
# Setup applies a hostPath PV q01-app-pv (manual storageClass) and a matching
# PVC app-data, plus a consumer Pod q01-app-consumer. PVC binding succeeds at
# the API-server level once a PV matches by storageClass + size + accessMode,
# so the post-setup symptom is PVC=Bound and PV=Bound. The trap (missing
# nodeAffinity making Pod scheduling fragile on multi-worker clusters) is
# detected by grade.sh's nodeAffinity assertion, not by symptom-diff.
# BLG-03 reshape: previous YAML claimed Pending/Available which is incorrect
# against actual setup behaviour — the PV binds as soon as the PVC arrives.
question: storage-pvc-binding
namespace: ${CKA_SIM_LAB_NS}
resources:
  - kind: pvc
    name: app-data
    namespace: ${CKA_SIM_LAB_NS}
    expect:
      status.phase: Bound
      spec.storageClassName: manual
  - kind: pv
    name: q01-app-pv
    expect:
      status.phase: Bound
      spec.storageClassName: manual
      spec.persistentVolumeReclaimPolicy: Retain
